<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Collection — e3gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Lato:wght@300;400;700&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
  .collection-hero {
    padding: 200px 0 60px;
    border-bottom: 1px solid var(--line);
    position: relative;
  }
  .collection-hero h1 {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 300;
    font-size: clamp(48px, 6vw, 84px);
    line-height: 1.05;
    color: var(--bone);
    letter-spacing: -0.015em;
    margin-top: 18px;
  }
  .collection-hero .meta {
    margin-top: 22px;
    color: var(--bone-dim);
    font-size: 15px;
    max-width: 540px;
    line-height: 1.7;
  }
  .filter-bar {
    position: sticky;
    top: 60px;
    z-index: 20;
    background: rgba(8, 18, 34, 0.92);
    backdrop-filter: blur(14px) saturate(120%);
    border-bottom: 1px solid var(--line);
    margin-bottom: 0;
  }
  .filter-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px 36px;
    align-items: center;
    padding: 22px 0;
  }
  .filter-row .filter-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--bone-faint);
    margin-right: 12px;
  }
  .filter-btn {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--bone-dim);
    padding: 8px 0;
    border-bottom: 1px solid transparent;
    transition: color 300ms var(--ease), border-color 300ms var(--ease);
  }
  .filter-btn:hover { color: var(--bone); }
  .filter-btn.active {
    color: var(--champagne);
    border-bottom-color: var(--champagne);
  }
  .filter-count {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--bone-faint);
  }
  .filter-count strong { color: var(--champagne); font-weight: 400; }

  .gallery {
    column-count: 3;
    column-gap: 18px;
    padding: 40px 0 120px;
  }
  .gallery .photo {
    break-inside: avoid;
    margin-bottom: 18px;
    width: 100%;
  }
  .photo.hidden { display: none; }
  @media (max-width: 1100px) {
    .gallery { column-count: 2; }
  }
  @media (max-width: 600px) {
    .gallery { column-count: 1; }
    .collection-hero { padding: 140px 0 40px; }
  }

  /* ── Lightbox (native <dialog>) ── */
  /* Bug fix: display:flex must only apply when [open] — inline display:flex
     overrides UA dialog:not([open]){display:none}, making dialog always visible
     as a full-screen dark overlay that intercepts all gallery clicks. */
  #lb[open] {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  #lb::backdrop {
    background: rgba(4, 9, 26, 0.92);
    backdrop-filter: blur(6px);
  }
  .lb-content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    max-width: 90vw;
    max-height: 90vh;
    width: 100%;
  }
  .lb-img-wrap {
    position: relative;
    max-width: 100%;
    max-height: calc(90vh - 100px);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .lb-img-wrap img {
    max-width: 90vw;
    max-height: calc(90vh - 100px);
    object-fit: contain;
    display: block;
    transform: scale(0.96);
    transition: transform 400ms var(--ease);
  }
  .lb.open .lb-img-wrap img {
    transform: scale(1);
  }
  .lb-foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    margin-top: 22px;
    padding: 0 4px;
  }
  .lb-meta {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .lb-title {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 300;
    font-size: 28px;
    color: var(--bone);
    line-height: 1;
    letter-spacing: -0.01em;
  }
  .lb-loc {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--champagne);
  }
  .lb-cta {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 12px 24px;
    font-family: var(--sans);
    font-weight: 400;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    background: var(--champagne);
    color: var(--midnight);
    border: 1px solid var(--champagne);
    transition: background 300ms var(--ease), letter-spacing 300ms var(--ease);
    white-space: nowrap;
  }
  .lb-cta:hover { background: var(--light); border-color: var(--light); letter-spacing: 0.22em; }

  .lb-arrow {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    z-index: 202;
    width: 48px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(8,18,34,0.5);
    border: 1px solid var(--line);
    color: var(--bone-dim);
    font-family: var(--mono);
    font-size: 20px;
    cursor: pointer;
    transition: background 200ms var(--ease), color 200ms var(--ease), border-color 200ms var(--ease);
    backdrop-filter: blur(8px);
  }
  .lb-arrow:hover { background: rgba(201,169,110,0.12); color: var(--champagne); border-color: var(--champagne); }
  .lb-arrow.prev { left: 20px; }
  .lb-arrow.next { right: 20px; }

  .lb-close {
    position: fixed;
    top: 20px;
    right: 24px;
    z-index: 202;
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(8,18,34,0.6);
    border: 1px solid var(--line);
    color: var(--bone-dim);
    font-size: 18px;
    cursor: pointer;
    backdrop-filter: blur(8px);
    transition: color 200ms, border-color 200ms;
  }
  .lb-close:hover { color: var(--champagne); border-color: var(--champagne); }

  .lb-counter {
    position: fixed;
    top: 26px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 202;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--bone-faint);
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="nav-slot"></div>

<header class="collection-hero" data-screen-label="01 Collection Header">
  <div class="container">
    <hr class="rule" />
    <span class="eyebrow" style="display:inline-block; margin-top: 16px;" data-i18n="col_eyebrow">The Collection</span>
    <h1 data-i18n="col_h1">All prints,<br/><em id="collCount">22 landscapes.</em></h1>
    <p class="meta" data-i18n="col_meta">Fine art photography from Iceland, France, Scotland, Spain and Italy. Each print archival-quality on premium paper. From 15€.</p>
  </div>
</header>

<div class="filter-bar">
  <div class="container">
    <div class="filter-row" id="filterRow">
      <span class="filter-label" data-i18n="col_filter">Filter</span>
      <button class="filter-btn active" data-filter="all" data-i18n="col_all">All</button>
      <button class="filter-btn" data-filter="Iceland">Iceland</button>
      <button class="filter-btn" data-filter="France">France</button>
      <button class="filter-btn" data-filter="Scotland">Scotland</button>
      <button class="filter-btn" data-filter="Spain">Spain</button>
      <button class="filter-btn" data-filter="Italy">Italy</button>
      <span class="filter-count" id="filterCount"></span>
    </div>
  </div>
</div>

<main class="container">
  <div class="gallery" id="gallery"></div>
</main>

<!-- Lightbox -->
<dialog id="lb" style="
  border:0; padding:0; margin:0;
  background:rgba(4,9,26,0.96);
  max-width:100vw; max-height:100vh;
  width:100vw; height:100vh;
  backdrop-filter:blur(6px);
">
  <div class="lb-content">
    <div class="lb-img-wrap">
      <img id="lbImg" src="" alt="" />
    </div>
    <div class="lb-foot">
      <div class="lb-meta">
        <span class="lb-title" id="lbTitle"></span>
        <span class="lb-loc" id="lbLoc"></span>
      </div>
      <a class="lb-cta" id="lbCta" href="#" target="_blank" rel="noopener">View Print →</a>
    </div>
  </div>
  <button class="lb-arrow prev" id="lbPrev" aria-label="Previous">‹</button>
  <button class="lb-arrow next" id="lbNext" aria-label="Next">›</button>
  <button class="lb-close" id="lbClose" aria-label="Close">✕</button>
  <span class="lb-counter" id="lbCounter"></span>
</dialog>

<div id="footer-slot"></div>

<script src="data.js"></script>
<script>
  mountChrome('collection');

  const gallery = document.getElementById('gallery');
  // render with inline onclick — most reliable across all browsers/environments
  gallery.innerHTML = CATALOG.map(p => {
    const aspect = p.aspect || '3/2';
    const from = priceFrom(p.slug);
    return `
      <div class="photo" data-country="${p.country}" data-slug="${p.slug}"
           style="aspect-ratio:${aspect}; cursor:pointer;"
           onclick="openLightbox('${p.slug}')">
        <img src="${p.img}" alt="${p.title} — ${p.region}" loading="lazy" />
        <div class="photo-tint" aria-hidden="true"></div>
        <div class="photo-overlay">
          <div class="photo-meta">
            <span class="photo-loc">${p.country}</span>
            <span class="photo-title">${p.title}</span>
            <span class="mono" style="color:var(--bone-dim);">From ${from}€ · Fullscreen →</span>
          </div>
        </div>
        <span class="photo-price" aria-hidden="true">From ${from}€</span>
      </div>`;
  }).join('');

  const filterCount = document.getElementById('filterCount');
  function setCount(filter) {
    const n = filter === 'all' ? CATALOG.length : CATALOG.filter(p => p.country === filter).length;
    filterCount.innerHTML = `<strong>${String(n).padStart(2,'0')}</strong> &nbsp;Prints`;
  }
  setCount('all');

  // initial filter from query string
  const params = new URLSearchParams(location.search);
  const initial = params.get('c');
  if (initial) {
    const map = { iceland:'Iceland', france:'France', scotland:'Scotland', spain:'Spain', italy:'Italy' };
    const f = map[initial.toLowerCase()];
    if (f) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === f));
      applyFilter(f);
    }
  }

  function applyFilter(filter) {
    document.querySelectorAll('#gallery .photo').forEach(el => {
      const match = filter === 'all' || el.dataset.country === filter;
      el.style.display = match ? '' : 'none';
      el.style.marginBottom = match ? '' : '0';
    });
    setCount(filter);
  }

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      applyFilter(btn.dataset.filter);
    });
  });

  // ── Lightbox ──
  const lb      = document.getElementById('lb');
  const lbImg   = document.getElementById('lbImg');
  const lbTitle = document.getElementById('lbTitle');
  const lbLoc   = document.getElementById('lbLoc');
  const lbCta   = document.getElementById('lbCta');
  const lbCounter = document.getElementById('lbCounter');
  let lbIndex = 0;

  function visiblePrints() {
    const activeFilter = document.querySelector('.filter-btn.active')?.dataset.filter || 'all';
    return activeFilter === 'all'
      ? CATALOG.slice()
      : CATALOG.filter(p => p.country === activeFilter);
  }

  function lbShow(index) {
    const prints = visiblePrints();
    if (!prints.length) return;
    lbIndex = (index + prints.length) % prints.length;
    const p = prints[lbIndex];
    lbImg.src = p.img;
    lbImg.alt = p.title;
    lbTitle.textContent = p.title;
    lbLoc.textContent = `${p.country} · ${p.region}`;
    lbCta.href = `print.html?slug=${p.slug}`;
    lbCounter.textContent = `${String(lbIndex + 1).padStart(2,'0')} / ${String(prints.length).padStart(2,'0')}`;
    lb.showModal();
    lb.classList.add('open');
  }

  function lbClose() {
    lb.close();
    lb.classList.remove('open');
  }

  // Global function called via inline onclick — works regardless of event bubbling
  window.openLightbox = function(slug) {
    const prints = visiblePrints();
    const idx = prints.findIndex(p => p.slug === slug);
    lbShow(idx >= 0 ? idx : 0);
  };

  lb.addEventListener('click', e => { if (e.target === lb) lbClose(); });
  document.getElementById('lbClose').addEventListener('click', lbClose);
  document.getElementById('lbPrev').addEventListener('click', () => lbShow(lbIndex - 1));
  document.getElementById('lbNext').addEventListener('click', () => lbShow(lbIndex + 1));

  document.addEventListener('keydown', e => {
    if (!lb.open) return;  // use native <dialog> open property, not class
    if (e.key === 'Escape') lbClose();
    if (e.key === 'ArrowLeft') lbShow(lbIndex - 1);
    if (e.key === 'ArrowRight') lbShow(lbIndex + 1);
  });
</script>

</body>
</html>
