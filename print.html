<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Print — e3gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Lato:wght@300;400;700&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
  .print-wrap {
    display: grid;
    grid-template-columns: 1.5fr 0.85fr;
    min-height: 100vh;
    padding-top: 60px;
  }
  .print-image {
    position: sticky;
    top: 60px;
    height: calc(100vh - 60px);
    background: var(--deep);
    overflow: hidden;
  }
  .print-image img {
    width: 100%; height: 100%;
    object-fit: cover;
    filter: saturate(0.95) contrast(1.02);
    transition: transform 1200ms var(--ease), filter 800ms var(--ease);
  }
  .print-image .pi-frame {
    position: absolute; inset: 40px;
    border: 1px solid rgba(245,240,232,0.10);
    pointer-events: none;
  }
  .print-image .pi-id {
    position: absolute;
    bottom: 56px;
    left: 56px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--bone-dim);
    padding: 4px 10px;
    background: rgba(8,18,34,0.6);
    backdrop-filter: blur(8px);
    border: 1px solid var(--line);
  }
  .print-panel {
    background: var(--elevated);
    padding: 80px 48px;
    overflow-y: auto;
    border-left: 1px solid var(--line);
    position: relative;
  }
  .print-panel .grain { opacity: 0.04; }
  .pp-eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--champagne);
    opacity: 0.9;
  }
  .pp-title {
    font-family: var(--serif);
    font-weight: 300;
    font-size: clamp(48px, 5vw, 68px);
    line-height: 1;
    color: var(--bone);
    margin-top: 16px;
    letter-spacing: -0.015em;
  }
  .pp-sub {
    margin-top: 14px;
    color: var(--bone-dim);
    font-weight: 300;
    font-size: 15px;
    letter-spacing: 0.005em;
  }
  .pp-rule { margin: 36px 0 32px; }
  .pp-section-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--bone-faint);
    margin-bottom: 14px;
    display: block;
  }
  .size-pills {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(82px, 1fr));
    gap: 10px;
  }
  .size-pill {
    border: 1px solid var(--line);
    background: transparent;
    color: var(--bone);
    padding: 18px 10px;
    text-align: center;
    transition: border-color 300ms var(--ease), background 300ms var(--ease), color 300ms var(--ease);
    cursor: pointer;
    font-family: var(--sans);
  }
  .size-pill:hover { border-color: var(--bone-dim); }
  .size-pill .sp-name {
    display: block;
    font-family: var(--serif);
    font-size: 18px;
    font-style: italic;
    font-weight: 300;
    margin-bottom: 4px;
    white-space: nowrap;
  }
  .size-pill .sp-price {
    font-family: var(--serif);
    font-style: italic;
    font-size: 22px;
    font-weight: 300;
    color: var(--bone-dim);
    display: block;
    line-height: 1;
    margin-top: 2px;
  }
  .size-pill.active {
    border-color: var(--champagne);
    background: rgba(201,169,110,0.08);
    color: var(--bone);
  }
  .size-pill.active .sp-price { color: var(--champagne); }

  .price-block {
    margin: 36px 0 28px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 14px;
  }
  .price-block .total {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 300;
    font-size: 56px;
    color: var(--bone);
    line-height: 1;
    letter-spacing: -0.01em;
  }
  .price-block .pb-meta {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--bone-faint);
  }

  .tech-line {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--bone-dim);
    line-height: 2;
    margin-bottom: 20px;
  }
  .tech-line span { color: var(--bone-faint); margin-right: 6px; }

  .cta-row {
    display: flex;
    gap: 12px;
    margin-top: 8px;
    margin-bottom: 40px;
  }
  .cta-row .btn { flex: 1; justify-content: center; }

  .blurb {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 300;
    font-size: 19px;
    line-height: 1.55;
    color: var(--bone);
    opacity: 0.92;
    margin-top: 8px;
    letter-spacing: 0.005em;
  }

  .ship-foot {
    margin-top: 48px;
    padding-top: 24px;
    border-top: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--bone-faint);
  }

  /* ── Triangle nav ── */
  /* .print-image is overflow:hidden so we clip the photo inside a wrapper
     and let the container itself be overflow:visible for the triangles */
  .print-image { overflow: visible; }
  .pi-img-clip {
    position: absolute; inset: 0;
    overflow: hidden;
  }
  .pi-img-clip img {
    width: 100%; height: 100%;
    object-fit: cover;
    filter: saturate(0.95) contrast(1.02);
  }

  .pi-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    z-index: 10;
    width: 0; height: 0;
    cursor: pointer;
    /* triangle via border trick */
  }
  .pi-nav.prev {
    left: 0;
    border-top: 36px solid transparent;
    border-bottom: 36px solid transparent;
    border-right: 28px solid rgba(180,180,190,0.13);
    transition: border-right-color 250ms var(--ease);
  }
  .pi-nav.next {
    right: 0;
    border-top: 36px solid transparent;
    border-bottom: 36px solid transparent;
    border-left: 28px solid rgba(180,180,190,0.13);
    transition: border-left-color 250ms var(--ease);
  }
  .pi-nav.prev:hover  { border-right-color: rgba(201,169,110,0.35); }
  .pi-nav.next:hover  { border-left-color:  rgba(201,169,110,0.35); }

  /* floating label */
  .pi-nav-label {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    white-space: nowrap;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--bone);
    background: rgba(8,18,34,0.75);
    backdrop-filter: blur(10px);
    border: 1px solid var(--line);
    padding: 7px 14px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 200ms var(--ease), transform 200ms var(--ease);
  }
  .pi-nav.prev .pi-nav-label {
    left: 36px;
    transform: translateY(-50%) translateX(-6px);
  }
  .pi-nav.next .pi-nav-label {
    right: 36px;
    transform: translateY(-50%) translateX(6px);
  }
  .pi-nav.prev:hover .pi-nav-label {
    opacity: 1;
    transform: translateY(-50%) translateX(0);
  }
  .pi-nav.next:hover .pi-nav-label {
    opacity: 1;
    transform: translateY(-50%) translateX(0);
  }

  @media (max-width: 1000px) {
    .print-wrap { grid-template-columns: 1fr; }
    .print-image { position: static; height: 70vh; }
    .print-panel { padding: 56px 28px; }
  }

  /* ── Image lightbox ── */
  .print-image { cursor: zoom-in; }
  .print-image .pi-zoom {
    position: absolute;
    top: 20px; right: 20px;
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(8,18,34,0.55);
    border: 1px solid var(--line);
    color: var(--bone-faint);
    font-size: 14px;
    backdrop-filter: blur(8px);
    pointer-events: none;
    opacity: 0;
    transition: opacity 300ms var(--ease);
  }
  .print-image:hover .pi-zoom { opacity: 1; }

  #piLb[open] {
    display: flex;
    align-items: center;
    justify-content: center;
    border: 0; padding: 0; margin: 0;
    background: rgba(4,9,26,0.97);
    max-width: 100vw; max-height: 100vh;
    width: 100vw; height: 100vh;
  }
  #piLb::backdrop { background: transparent; }
  #piLb img {
    max-width: 95vw;
    max-height: 95vh;
    object-fit: contain;
    display: block;
    transform: scale(0.97);
    transition: transform 400ms var(--ease);
  }
  #piLb[open] img { transform: scale(1); }
  #piLbClose {
    position: fixed; top: 20px; right: 24px;
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(8,18,34,0.6);
    border: 1px solid var(--line);
    color: var(--bone-dim);
    font-size: 18px;
    cursor: pointer;
    backdrop-filter: blur(8px);
    transition: color 200ms, border-color 200ms;
    z-index: 10;
  }
  #piLbClose:hover { color: var(--champagne); border-color: var(--champagne); }
</style>
</head>
<body>

<div id="nav-slot"></div>

<main class="print-wrap" data-screen-label="01 Print Detail">
  <div class="print-image" id="printImageArea">
    <div class="pi-img-clip">
      <img id="printImg" alt="" />
    </div>
    <div class="pi-frame"></div>
    <span class="pi-id" id="printId">—</span>
    <span class="pi-zoom" aria-hidden="true">⊕</span>
    <div class="pi-nav prev" id="piPrev" title="">
      <span class="pi-nav-label" id="piPrevLabel"></span>
    </div>
    <div class="pi-nav next" id="piNext" title="">
      <span class="pi-nav-label" id="piNextLabel"></span>
    </div>
  </div>

  <aside class="print-panel">
    <div class="grain"></div>

    <span class="pp-eyebrow" id="ppEyebrow">— · Fine Art Print</span>
    <h1 class="pp-title" id="ppTitle">—</h1>
    <p class="pp-sub" id="ppSub">—</p>

    <p class="blurb" id="ppBlurb" style="margin: 20px 0 0;"></p>

    <hr class="rule pp-rule" />

    <span class="pp-section-label" data-i18n="print_choose_size">Choose a size</span>
    <div class="size-pills" id="sizePills"></div>

    <div class="tech-line" style="margin-top: 28px;">
      <div><span data-i18n="print_paper">Paper:</span> <span id="ppPaper">—</span></div>
      <div><span data-i18n="print_process">Process:</span> Archival pigment print</div>
      <div><span data-i18n="print_shipping">Shipping:</span> <span data-i18n="print_shipping_val">Rolled in archival tube · Worldwide</span></div>
    </div>

    <div class="cta-row">
      <a class="btn" id="etsyBtn" href="#" target="_blank" rel="noopener" data-i18n="print_order_etsy">Order on Etsy →</a>
      <a class="btn ghost" href="collection.html" data-i18n="print_all_prints">All Prints</a>
    </div>

    <div class="ship-foot">
      <span data-i18n="print_ships">Ships worldwide</span>
      <span style="color:var(--champagne)" data-i18n="print_secure">Secure checkout via Etsy</span>
    </div>
  </aside>
</main>

<!-- Image lightbox -->
<dialog id="piLb">
  <img id="piLbImg" src="" alt="" />
  <button id="piLbClose" aria-label="Close">✕</button>
</dialog>

<script src="data.js"></script>
<script>
  mountChrome('collection');

  const params = new URLSearchParams(location.search);
  const slug = params.get('slug') || CATALOG[0].slug;
  let print = findPrint(slug);
  let activeSize = 0;

  function render() {
    const tpl = templateFor(print.slug);
    if (activeSize >= tpl.variants.length) activeSize = 0;

    document.title = `${print.title} — e3gallery`;
    document.getElementById('printImg').src = print.img;
    document.getElementById('printImg').alt = `${print.title} — ${print.region}`;
    document.getElementById('printId').textContent = `№ ${String(CATALOG.indexOf(print) + 1).padStart(2,'0')} / ${CATALOG.length} — ${print.country}`;
    document.getElementById('ppEyebrow').textContent = `${print.country} · Fine Art Print`;
    document.getElementById('ppTitle').textContent = print.title;
    document.getElementById('ppSub').textContent = print.region;
    const lang = typeof getLang === 'function' ? getLang() : 'en';
    document.getElementById('ppBlurb').textContent = (lang === 'es' && print.blurb_es) ? print.blurb_es : print.blurb;
    document.getElementById('etsyBtn').href = print.etsyUrl;
    document.getElementById('ppPaper').textContent = tpl.paper;

    document.getElementById('sizePills').innerHTML = tpl.variants.map((s, i) => `
      <button class="size-pill ${i === activeSize ? 'active' : ''}" data-i="${i}">
        <span class="sp-name">${s.name}</span>
        <span class="sp-price">${s.price}€</span>
      </button>
    `).join('');

    document.querySelectorAll('.size-pill').forEach(btn => {
      btn.addEventListener('click', () => {
        activeSize = parseInt(btn.dataset.i);
        render();
      });
    });

    // triangle nav
    const idx = CATALOG.indexOf(print);
    const prev = CATALOG[(idx - 1 + CATALOG.length) % CATALOG.length];
    const next = CATALOG[(idx + 1) % CATALOG.length];
    document.getElementById('piPrevLabel').textContent = `← ${prev.title}`;
    document.getElementById('piNextLabel').textContent = `${next.title} →`;
    document.getElementById('piPrev').onclick = e => { e.stopPropagation(); location.href = `print.html?slug=${prev.slug}`; };
    document.getElementById('piNext').onclick = e => { e.stopPropagation(); location.href = `print.html?slug=${next.slug}`; };
  }

  render();

  // Re-render blurb when language changes
  new MutationObserver(() => render()).observe(document.documentElement, { attributes: true, attributeFilter: ['lang'] });

  // ── Image lightbox ──
  const piLb = document.getElementById('piLb');
  const piLbImg = document.getElementById('piLbImg');

  document.getElementById('printImageArea').addEventListener('click', () => {
    piLbImg.src = document.getElementById('printImg').src;
    piLbImg.alt = document.getElementById('printImg').alt;
    piLb.showModal();
  });

  document.getElementById('piLbClose').addEventListener('click', () => piLb.close());
  piLb.addEventListener('click', e => { if (e.target === piLb) piLb.close(); });
  document.addEventListener('keydown', e => {
    if (piLb.open && e.key === 'Escape') piLb.close();
  });
</script>

</body>
</html>
